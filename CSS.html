<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ==========================================
   GLOBAL
========================================== */

:root{

    --brand:#ff6b00;

}

html,
body{

    height:100%;
    margin:0;
    padding:0;

    background:#f5f7fa;

    font-family:Arial, Helvetica, sans-serif;

    font-size:14px;

    overflow:hidden;

}

/* ==========================================
   HEADER
========================================== */

.navbar{

    height:60px;

}

/* ==========================================
   SIDEBAR
========================================== */

#sidebar{

    position:fixed;

    top:60px;

    left:0;

    width:220px;

    height:calc(100vh - 60px);

    overflow-y:auto;

    background:#ffffff;

    border-right:1px solid #dee2e6;

}

/* ==========================================
   MAIN CONTENT
========================================== */

#main-content{

    margin-left:220px;

    margin-top:60px;

    height:calc(100vh - 60px);

    overflow-y:auto;

    padding:12px;

}

/* ==========================================
   TYPOGRAPHY
========================================== */

body{

    font-size:14px;

}

.card-header h4{

    font-size:1.45rem;
    margin:0;

}

.card-header h5{

    font-size:1.1rem;
    margin:0;

}

h5{

    font-size:1.05rem;

}

.form-label{

    font-size:13px;
    font-weight:600;
    margin-bottom:4px;

}

.form-control,
.form-select{

    font-size:14px;

}

.btn{

    font-size:14px;

}

.list-group-item{

    font-size:15px;

}

/* ==========================================
   CARDS
========================================== */

.card{

    border-radius:10px;

    margin-bottom:12px;

}

.card-body{

    padding:16px;

}

/* ==========================================
   FORMS
========================================== */

.row.g-3{

    row-gap:.6rem !important;

}

.input-group-text{

    font-size:14px;

}

/* ==========================================
   SIDEBAR MENU
========================================== */

#sidebar .list-group-item{

    padding:12px 16px;

}

/* ==========================================
   MOBILE
========================================== */

@media(max-width:768px){

    #sidebar{

        position:relative;

        width:100%;

        height:auto;

        top:0;

    }

    #main-content{

        margin-left:0;

        margin-top:0;

        height:auto;

        padding:10px;

    }

}

</style>
