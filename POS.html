<div class="container-fluid">

  <div class="row">

    <!-- LEFT PANEL -->

    <div class="col-lg-8">

      <div class="card shadow-sm mb-4">

        <div class="card-header bg-primary text-white">

          <h4 class="mb-0">
            🍛 Point of Sale
          </h4>

        </div>

        <div class="card-body">

          <h5 class="mb-3">
            Customer Information
          </h5>

          <div class="row g-3">

            <!-- Customer Name -->

            <div class="col-md-4">

              <label class="form-label">
                                Customer Name
                            </label>

              <input
                                type="text"
                                id="customerName"
                                class="form-control"
                                placeholder="Enter customer name">

            </div>

            <!-- Mobile -->

            <div class="col-md-4">

              <label class="form-label">
                                Mobile Number
                            </label>

              <input
                                type="text"
                                id="mobile"
                                maxlength="10"
                                class="form-control"
                                placeholder="9876543210"
                                onkeyup="searchCustomer()">

            </div>

            <!-- Delivery Area -->

            <div class="col-md-4">

              <label class="form-label">
                                Delivery Area
                            </label>

              <select
    id="deliveryArea"
    class="form-select"
    onchange="updateDeliveryCharge()">

                                <option value="">
                                    Select Delivery Area
                                </option>

                            </select>

            </div>

            <!-- House Address -->

            <div class="col-12">

              <label class="form-label">
                                House / Flat Address
                            </label>

              <textarea
                                id="houseAddress"
                                rows="2"
                                class="form-control"
                                placeholder="House No., Landmark, Street..."></textarea>

            </div>

<div class="col-md-4">

    <label class="form-label">

        Order Date

    </label>

    <input
        type="date"
        id="orderDate"
        class="form-control">

</div>



            <!-- Delivery Slot -->

            <div class="col-md-4">

              <label class="form-label">
                                Delivery Slot
                            </label>

              <select
                                id="deliverySlot"
                                class="form-select">

                                <option>Lunch</option>
                                <option>Dinner</option>

                            </select>

            </div>

            <!-- Order Type -->

            <div class="col-md-4">

              <label class="form-label">
                                Order Type
                            </label>

              <select
                                id="orderType"
                                class="form-select">

                                <option>Delivery</option>
                                <option>Pickup</option>

                            </select>

            </div>

            <!-- Payment -->

            <div class="col-md-4">

              <label class="form-label">
                                Payment Mode
                            </label>

              <select
                                id="paymentMode"
                                class="form-select">

                                <option>Cash</option>
                                <option>UPI</option>

                            </select>

            </div>

<!-- Payment Status -->

<div class="col-md-4">

    <label class="form-label">

        Payment Status

    </label>

    <select
        id="paymentStatus"
        class="form-select">

        <option>Paid</option>

        <option>Pending</option>

        <option>Partial</option>

    </select>

</div>

          </div>

          <hr class="my-4">

          <h5 class="mb-3">
            🍽 Search Menu
          </h5>

          <div class="position-relative">

            <input
                            type="text"
                            id="menuSearch"
                            class="form-control form-control-lg"
                            placeholder="Search menu item..."
                            onkeyup="searchMenuItems()">

            <div id="menuSuggestions" class="list-group position-absolute w-100 shadow"
              style="z-index:1000; max-height:300px; overflow-y:auto;">

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="col-lg-4">

      <!-- Shopping Cart -->

      <div class="card shadow-sm mb-3">

        <div class="card-header bg-success text-white">

          <h5 class="mb-0">
            🛒 Shopping Cart
          </h5>

        </div>

        <div class="card-body">

          <div id="cartItems">

            <div class="text-center text-muted py-5">

              No items added

            </div>

          </div>

        </div>

      </div>


      <!-- ==========================================
     Special Instructions
========================================== -->

      <div class="card shadow-sm mt-3">

        <div class="card-header">

          <strong>📝 Special Instructions</strong>

        </div>

        <div class="card-body">

          <div class="mb-3" id="quickNotes">

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Less Spicy')">

                Less Spicy

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Extra Spicy')">

                Extra Spicy

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('No Onion')">

                No Onion

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('No Garlic')">

                No Garlic

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Extra Gravy')">

                Extra Gravy

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Less Oil')">

                Less Oil

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Call Customer')">

                Call Customer

            </button>

            <button class="btn btn-outline-secondary btn-sm m-1"
                onclick="addQuickNote('Ring Bell')">

                Ring Bell

            </button>

          </div>

          <textarea

            id="specialInstructions"

            class="form-control"

            rows="3"

            placeholder="Additional instructions...">

        </textarea>

        </div>

      </div>

      <!-- Order Summary -->

      <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">

          <h5 class="mb-0">
            Order Summary
          </h5>

        </div>

        <div class="card-body">

          <div class="d-flex justify-content-between mb-2">

            <span>Subtotal</span>

            <strong id="subTotal">
                            ₹0
                        </strong>

          </div>

          <div class="row align-items-center mb-2">

            <div class="col-6">

              <label class="form-label mb-0">

            Discount

        </label>

            </div>

            <div class="col-6">

              <div class="input-group input-group-sm">

                <span class="input-group-text">₹</span>

                <input
                type="number"
                placeholder="0"
                id="discount"
                class="form-control text-end"
                value="0"
                min="0"
                step="1"
                onchange="calculateTotals()"
                oninput="calculateTotals()">

              </div>

            </div>

          </div>

          <div class="d-flex justify-content-between mb-3">

            <span>Delivery Charge</span>

            <strong id="deliveryCharge">
                            ₹0
                        </strong>

          </div>

          <hr>

          <div class="d-flex justify-content-between fs-4">

            <strong>
                            Grand Total
                        </strong>

            <strong id="grandTotal">

                            ₹0

                        </strong>

          </div>

<button
    id="btnSaveOrder"
    type="button"
    class="btn btn-success btn-lg w-100"
    onclick="saveOrder()"
    disabled>

    💾 Save Order

</button>

        </div>

      </div>

    </div>

  </div>

</div>
