<!-- ==========================================
     Business Costs
========================================== -->

<div class="container-fluid">

    <!-- Page Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="mb-0">
            💼 Business Costs
        </h3>

        <button
            class="btn btn-success"
            onclick="openBusinessCostModal()">

            ➕ Add Business Cost

        </button>

    </div>

    <!-- Summary Card -->

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card shadow-sm border-primary">

                <div class="card-body text-center">

                    <h6 class="text-muted">

                        Total Active Business Cost

                    </h6>

                    <h3 id="totalBusinessCost">

                        ₹0.00

                    </h3>

                </div>

            </div>

        </div>

    </div>

    <!-- Business Cost Table -->

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">

            Business Cost Master

        </div>

        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-light">

                    <tr>

                        <th style="width:220px;">
                            Cost Head
                        </th>

                        <th class="text-end" style="width:120px;">
                            Amount
                        </th>

                        <th style="width:140px;">
                            Unit
                        </th>

                        <th style="width:100px;">
                            Status
                        </th>

                        <th>
                            Remarks
                        </th>

                        <th style="width:150px;" class="text-center">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="businessCostsTableBody">

                    <tr>

                        <td colspan="6" class="text-center text-muted">

                            No Business Costs Found.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>




<!-- ==========================================
     Add / Edit Business Cost Modal
========================================== -->

<div
    class="modal fade"
    id="businessCostModal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5
                    class="modal-title"
                    id="businessCostModalTitle">

                    Add Business Cost

                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="businessCostRow">

                <div class="row g-3">

                    <!-- Cost Head -->

                    <div class="col-md-6">

                        <label class="form-label fw-bold">

                            Cost Head

                        </label>

                        <input
                            type="text"
                            id="costHead"
                            class="form-control"
                            placeholder="Enter Cost Head">

                    </div>

                    <!-- Amount -->

                    <div class="col-md-3">

                        <label class="form-label fw-bold">

                            Amount

                        </label>

                        <input
                            type="number"
                            id="costAmount"
                            class="form-control"
                            min="0"
                            step="0.01">

                    </div>

                    <!-- Unit -->

                    <div class="col-md-3">

                        <label class="form-label fw-bold">

                            Unit

                        </label>

                        <select
                            id="costUnit"
                            class="form-select">

                            <option value="Per Order">
                                Per Order
                            </option>

                            <option value="Per Day">
                                Per Day
                            </option>

                            <option value="Per Month">
                                Per Month
                            </option>

                            <option value="Per Year">
                                Per Year
                            </option>

                            <option value="Percentage">
                                Percentage
                            </option>

                        </select>

                    </div>

                    <!-- Active -->

                    <div class="col-md-3">

                        <label class="form-label fw-bold">

                            Active

                        </label>

                        <select
                            id="costActive"
                            class="form-select">

                            <option value="Yes">

                                Yes

                            </option>

                            <option value="No">

                                No

                            </option>

                        </select>

                    </div>

                    <!-- Remarks -->

                    <div class="col-md-9">

                        <label class="form-label fw-bold">

                            Remarks

                        </label>

                        <input
                            type="text"
                            id="costRemarks"
                            class="form-control"
                            placeholder="Optional">

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    class="btn btn-success"
                    onclick="saveBusinessCost()">

                    💾 Save

                </button>

            </div>

        </div>

    </div>

</div>
